<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Singapore Flood Alerts</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background:#0d1117; color:#e6edf3; display:flex; flex-direction:column;
}

/* ── header ── */
#hdr {
  background:#161b22; border-bottom:1px solid #21262d;
  padding:8px 14px; display:flex; align-items:center;
  justify-content:space-between; flex-shrink:0; min-height:44px;
}
#hdr-left { display:flex; align-items:center; gap:10px; }
#dot { width:10px; height:10px; border-radius:50%; background:#555; flex-shrink:0; }
#dot.live  { background:#3fb950; animation:blink-g 2s infinite; }
#dot.alert { background:#f85149; animation:blink-r 1s infinite; }
@keyframes blink-g { 0%,100%{box-shadow:0 0 0 0 rgba(63,185,80,.5)} 50%{box-shadow:0 0 0 5px rgba(63,185,80,0)} }
@keyframes blink-r { 0%,100%{box-shadow:0 0 0 0 rgba(248,81,73,.5)} 50%{box-shadow:0 0 0 5px rgba(248,81,73,0)} }
#hdr-title { font-size:13px; font-weight:600; line-height:1.3; }
#hdr-sub   { font-size:10px; color:#8b949e; }
#pill {
  font-size:10px; padding:3px 8px; border-radius:4px;
  border:1px solid #30363d; color:#8b949e; white-space:nowrap;
}
#pill.ok   { color:#3fb950; border-color:rgba(63,185,80,.4); background:rgba(63,185,80,.08); }
#pill.err  { color:#f85149; border-color:rgba(248,81,73,.4); background:rgba(248,81,73,.08); }
#pill.warn { color:#d29922; border-color:rgba(210,153,34,.4); background:rgba(210,153,34,.08); }

/* ── body: map + sidebar ── */
#body { display:flex; flex:1; overflow:hidden; position:relative; }
#map  { flex:1; min-width:0; }

/* ── sidebar ── */
#side {
  width:240px; background:#161b22; border-left:1px solid #21262d;
  display:flex; flex-direction:column; overflow:hidden; flex-shrink:0;
}

/* stats row */
#stats {
  display:grid; grid-template-columns:1fr 1fr;
  gap:1px; background:#21262d; flex-shrink:0;
}
.sbox { background:#161b22; padding:8px 10px; }
.slabel { font-size:9px; color:#8b949e; text-transform:uppercase; letter-spacing:.5px; margin-bottom:2px; }
.sval   { font-size:20px; font-weight:700; }
.sval.g { color:#3fb950; }
.sval.r { color:#f85149; }
.sval.a { color:#d29922; }

/* alert list */
#list-hdr {
  padding:7px 10px 5px; font-size:9px; text-transform:uppercase;
  letter-spacing:.5px; color:#8b949e; border-bottom:1px solid #21262d;
  border-top:1px solid #21262d; flex-shrink:0;
  display:flex; justify-content:space-between; align-items:center;
}
#demo-tag {
  font-size:8px; padding:1px 5px; border-radius:3px;
  background:rgba(210,153,34,.15); color:#d29922;
  border:1px solid rgba(210,153,34,.3); display:none;
}
#list { overflow-y:auto; flex:1; }
#list::-webkit-scrollbar { width:3px; }
#list::-webkit-scrollbar-thumb { background:#30363d; border-radius:2px; }

.card {
  padding:9px 10px; border-bottom:1px solid #21262d;
  cursor:pointer; transition:background .12s;
}
.card:hover { background:#1c2128; }

/* severity badge */
.badge {
  display:inline-block; font-size:9px; font-weight:700;
  padding:2px 6px; border-radius:3px; margin-bottom:4px;
  text-transform:uppercase; letter-spacing:.3px;
}
.e { background:rgba(248,81,73,.15);  color:#f85149; border:1px solid rgba(248,81,73,.3); }
.s { background:rgba(210,153,34,.15); color:#d29922; border:1px solid rgba(210,153,34,.3); }
.m { background:rgba(88,166,255,.15); color:#58a6ff; border:1px solid rgba(88,166,255,.3); }
.n { background:rgba(63,185,80,.15);  color:#3fb950; border:1px solid rgba(63,185,80,.3); }
.u { background:rgba(139,148,158,.15);color:#8b949e; border:1px solid rgba(139,148,158,.3); }

.cloc  { font-size:11px; font-weight:500; line-height:1.4; margin-bottom:2px; color:#e6edf3; }
.cmeta { font-size:10px; color:#8b949e; }

/* all-clear */
#clear { padding:24px 12px; text-align:center; }
.c-icon  { font-size:26px; margin-bottom:6px; }
.c-title { font-size:12px; font-weight:600; color:#3fb950; margin-bottom:3px; }
.c-sub   { font-size:10px; color:#8b949e; line-height:1.5; }

/* status bar */
#sbar {
  padding:5px 10px; font-size:9px; color:#555;
  border-top:1px solid #21262d; flex-shrink:0; line-height:1.4;
}

/* spinner */
#spin-wrap {
  position:absolute; inset:0; background:rgba(13,17,23,.75);
  display:flex; align-items:center; justify-content:center;
  z-index:9999; gap:8px; font-size:11px; color:#8b949e;
}
.spinner {
  width:13px; height:13px; border:2px solid #30363d;
  border-top-color:#58a6ff; border-radius:50%;
  animation:sp .7s linear infinite;
}
@keyframes sp { to{transform:rotate(360deg)} }

.leaflet-container { background:#0d1117 !important; }
.leaflet-popup-content-wrapper { background:#1c2128; color:#e6edf3; border:1px solid #30363d; border-radius:6px; box-shadow:none; }
.leaflet-popup-tip { background:#1c2128; }
.leaflet-popup-content { font-size:11px; line-height:1.5; margin:8px 10px; }
</style>
</head>
<body>

<div id="hdr">
  <div id="hdr-left">
    <div id="dot"></div>
    <div>
      <div id="hdr-title">Singapore Flood Alerts</div>
      <div id="hdr-sub">PUB real-time &mdash; data.gov.sg</div>
    </div>
  </div>
  <span id="pill" class="warn">connecting&hellip;</span>
</div>

<div id="body">
  <div id="spin-wrap"><div class="spinner"></div>Fetching live data&hellip;</div>
  <div id="map"></div>
  <div id="side">
    <div id="stats">
      <div class="sbox">
        <div class="slabel">Active alerts</div>
        <div class="sval" id="sv-count">—</div>
      </div>
      <div class="sbox">
        <div class="slabel">Highest severity</div>
        <div class="sval" id="sv-sev">—</div>
      </div>
    </div>
    <div id="list-hdr">
      Alert locations
      <span id="demo-tag">DEMO</span>
    </div>
    <div id="list"></div>
    <div id="sbar">Connecting&hellip;</div>
  </div>
</div>

<script>
const map = L.map('map',{center:[1.3521,103.8198],zoom:11,zoomControl:true,attributionControl:false});
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{maxZoom:19}).addTo(map);
L.control.attribution({prefix:false}).addAttribution('&copy; CartoDB | PUB data.gov.sg').addTo(map);

const ENDPOINTS = [
  'https://corsproxy.io/?https://api-open.data.gov.sg/v2/real-time/api/flood-alerts',
  'https://api.allorigins.win/raw?url=' + encodeURIComponent('https://api-open.data.gov.sg/v2/real-time/api/flood-alerts'),
  'https://api-open.data.gov.sg/v2/real-time/api/flood-alerts',
  'https://api.data.gov.sg/v1/environment/flood-alerts'
];

const DEMO = [
  {severity:'Severe',  urgency:'Immediate', message:'Orchard Road (near Somerset MRT)',            lat:1.3006, lng:103.8389},
  {severity:'Moderate',urgency:'Expected',  message:'Bukit Timah Rd (near Sixth Ave)',              lat:1.3313, lng:103.7952},
  {severity:'Minor',   urgency:'Future',    message:'Geylang Rd / Lor 1 Geylang junction',          lat:1.3139, lng:103.8774},
  {severity:'Minor',   urgency:'Future',    message:'Thomson Rd (Balestier to Novena Rise)',         lat:1.3264, lng:103.8395}
];

let markers=[], timer=null;

function sevBadgeClass(s){
  if(!s) return 'u';
  s=s.toLowerCase();
  if(s.includes('extreme')) return 'e';
  if(s.includes('severe')||s.includes('high')) return 's';
  if(s.includes('moderate')||s.includes('medium')) return 'm';
  if(s.includes('minor')||s.includes('low')) return 'n';
  return 'u';
}
function sevColor(s){
  return {e:'#f85149',s:'#d29922',m:'#58a6ff',n:'#3fb950',u:'#8b949e'}[sevBadgeClass(s)];
}
const SEV_ORDER=['extreme','severe','high','moderate','medium','minor','low'];
function topSev(items){
  let best=-1;
  for(const it of items){
    const idx=SEV_ORDER.findIndex(o=>(it.severity||'').toLowerCase().includes(o));
    if(idx!==-1&&(best===-1||idx<best)) best=idx;
  }
  return best===-1?null:['Extreme','Severe','High','Moderate','Medium','Minor','Low'][best];
}

function render(items, isDemo){
  markers.forEach(m=>map.removeLayer(m)); markers=[];
  const list=document.getElementById('list');
  list.innerHTML='';
  document.getElementById('demo-tag').style.display=isDemo?'inline':'none';

  const dot=document.getElementById('dot');
  const countEl=document.getElementById('sv-count');
  const sevEl=document.getElementById('sv-sev');

  if(items.length===0){
    dot.className='live';
    countEl.textContent='0'; countEl.className='sval g';
    sevEl.textContent='Clear'; sevEl.className='sval g';
    list.innerHTML=`<div id="clear">
      <div class="c-icon">&#9989;</div>
      <div class="c-title">No active flood alerts</div>
      <div class="c-sub">Singapore is currently clear.<br>Data refreshes every 60 seconds.</div>
    </div>`;
    return;
  }

  dot.className='alert';
  countEl.textContent=items.length; countEl.className='sval r';
  const hs=topSev(items);
  sevEl.textContent=hs||'—'; sevEl.className='sval a';

  items.forEach(item=>{
    const sev = item.severity||'Unknown';
    const loc = item.message||item.location||item.area||item.title||'Unknown location';
    const urg = item.urgency||'';
    let lat = item.lat||item.latitude||(item.location_geometry&&item.location_geometry.lat)||(item.coordinates&&item.coordinates[1]);
    let lng = item.lng||item.lon||item.longitude||(item.location_geometry&&item.location_geometry.long)||(item.coordinates&&item.coordinates[0]);

    const card=document.createElement('div');
    card.className='card';
    card.innerHTML=`
      <span class="badge ${sevBadgeClass(sev)}">${sev}</span>
      <div class="cloc">${loc}</div>
      ${urg?`<div class="cmeta">Urgency: ${urg}</div>`:''}`;
    list.appendChild(card);

    if(lat&&lng){
      const col=sevColor(sev);
      const icon=L.divIcon({
        className:'',
        html:`<div style="width:14px;height:14px;border-radius:50%;background:${col};border:2px solid rgba(255,255,255,.2);box-shadow:0 0 8px ${col}88;"></div>`,
        iconSize:[14,14],iconAnchor:[7,7]
      });
      const mk=L.marker([lat,lng],{icon}).addTo(map);
      mk.bindPopup(`<b style="font-size:12px">${loc}</b><br><span style="color:#8b949e">Severity:</span> ${sev}${urg?`<br><span style="color:#8b949e">Urgency:</span> ${urg}`:''}`);
      markers.push(mk);
      card.onclick=()=>{map.setView([lat,lng],15);mk.openPopup();};
    }
  });

  if(markers.length>0) map.fitBounds(L.featureGroup(markers).getBounds().pad(0.3));
}

async function load(){
  document.getElementById('spin-wrap').style.display='flex';
  const pill=document.getElementById('pill');
  pill.textContent='connecting…'; pill.className='pill warn';

  let ok=false;
  for(const url of ENDPOINTS){
    try{
      const res=await fetch(url,{headers:{Accept:'application/json'}});
      if(!res.ok) continue;
      const json=await res.json();
      let items=[];
      if(Array.isArray(json)) items=json;
      else if(json.data?.items) items=json.data.items;
      else if(json.items) items=json.items;
      else if(json.alerts) items=json.alerts;
      else if(json.result?.records) items=json.result.records;

      render(items,false);
      const t=new Date().toLocaleTimeString('en-SG',{hour:'2-digit',minute:'2-digit'});
      pill.textContent=`Live \u2022 ${t} SGT`; pill.className='pill ok';
      document.getElementById('dot').className=items.length?'alert':'live';
      document.getElementById('sbar').textContent=`Source: data.gov.sg  \u00b7  Auto-refresh: 60 s`;
      ok=true; break;
    }catch(e){}
  }

  if(!ok){
    render(DEMO,true);
    pill.textContent='API unreachable — demo data'; pill.className='pill err';
    document.getElementById('sbar').textContent='Cannot reach data.gov.sg — showing demo data. Check CORS/network.';
  }

  document.getElementById('spin-wrap').style.display='none';
  if(timer) clearTimeout(timer);
  timer=setTimeout(load,60000);
}

load();
</script>
</body>
</html>
